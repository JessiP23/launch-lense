<body>
    <div class="container">
        <h1>Meta Pixel Test Page</h1>
        <p>Use this URL for Meta Event Testing: <strong>https://launch-lense.vercel.app/pixel-test.html</strong></p>
        
        <div class="status">
            ✅ Pixel Loaded (check Meta Events Manager)
        </div>
        
        <button onclick="testLeadEvent()">Test Lead Event</button>
        <button onclick="testPurchaseEvent()">Test Purchase Event</button>
        <button onclick="testCustomEvent()">Test Custom Event</button>
    </div>

    <script>
        function testLeadEvent() {
            if (typeof fbq !== 'undefined') {
                fbq('track', 'Lead');
                alert('Lead event fired! Check Meta Events Manager');
            }
        }

        function testPurchaseEvent() {
            if (typeof fbq !== 'undefined') {
                fbq('track', 'Purchase', {value: 29.99, currency: 'USD'});
                alert('Purchase event fired! Check Meta Events Manager');
            }
        }

        function testCustomEvent() {
            if (typeof fbq !== 'undefined') {
                fbq('trackCustom', 'LaunchLenseTest', {test_param: 'working'});
                alert('Custom event fired! Check Meta Events Manager');
            }
        }
    </script>
