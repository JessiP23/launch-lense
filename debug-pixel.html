<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Pixel Test - LaunchLense</title>
    <!-- Meta Pixel Code -->
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '1510106240565645');
    fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=1510106240565645&ev=PageView&noscript=1"
    /></noscript>
    <!-- End Meta Pixel Code -->
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0A0A0A; color: #FAFAFA; padding: 40px; }
        .container { max-width: 600px; margin: 0 auto; }
        .status { padding: 20px; border-radius: 8px; margin: 20px 0; }
        .success { background: #059669; }
        .error { background: #dc2626; }
        .info { background: #2563eb; }
        button { background: #FAFAFA; color: #0A0A0A; border: none; padding: 14px 28px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Meta Pixel Test Page</h1>
        <p>This page tests if your Meta Pixel (ID: 1510106240565645) is working correctly.</p>
        
        <div class="status info" id="pixel-status">
            Checking pixel status...
        </div>
        
        <button onclick="testLeadEvent()">Test Lead Event</button>
        <button onclick="testCustomEvent()">Test Custom Event</button>
        
        <div id="event-log" style="margin-top: 20px;"></div>
    </div>

    <script>
        function log(message, isError = false) {
            const logDiv = document.getElementById('event-log');
            const entry = document.createElement('div');
            entry.style.cssText = `padding: 10px; margin: 5px 0; background: ${isError ? '#dc2626' : '#059669'}; border-radius: 4px;`;
            entry.textContent = `${new Date().toLocaleTimeString()}: ${message}`;
            logDiv.appendChild(entry);
        }

        function checkPixel() {
            setTimeout(() => {
                if (typeof fbq !== 'undefined') {
                    document.getElementById('pixel-status').innerHTML = '✅ Meta Pixel loaded successfully!';
                    document.getElementById('pixel-status').className = 'status success';
                    log('Meta Pixel initialized and ready');
                } else {
                    document.getElementById('pixel-status').innerHTML = '❌ Meta Pixel failed to load';
                    document.getElementById('pixel-status').className = 'status error';
                    log('Meta Pixel failed to load', true);
                }
            }, 2000);
        }

        function testLeadEvent() {
            if (typeof fbq !== 'undefined') {
                fbq('track', 'Lead');
                log('Lead event fired successfully');
            } else {
                log('Cannot fire Lead event - pixel not loaded', true);
            }
        }

        function testCustomEvent() {
            if (typeof fbq !== 'undefined') {
                fbq('trackCustom', 'TestEvent', {custom_param: 'test_value'});
                log('Custom event fired successfully');
            } else {
                log('Cannot fire Custom event - pixel not loaded', true);
            }
        }

        // Check pixel on page load
        checkPixel();

        // Monitor for pixel errors
        window.addEventListener('error', function(e) {
            if (e.filename && e.filename.includes('facebook')) {
                log(`Pixel error: ${e.message}`, true);
            }
        });
    </script>
</body>
</html>
